<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
    <title>James Rogg</title>
    <link rel="stylesheet" href="assets/css/styles.css?v=20260310t" />
  </head>
  <body>
    <div class="grain" aria-hidden="true"></div>

    <div class="layout">
      <aside class="sidebar">
        <a class="brand" href="#">James Rogg </a>

        <nav class="tab-nav" aria-label="Portfolio tabs" role="tablist">
          <button class="tab is-active" id="tab-portraits" role="tab" data-tab="portraits" aria-controls="panel-portraits" aria-selected="true">Portraits</button>
          <button class="tab" id="tab-places" role="tab" data-tab="places" aria-controls="panel-places" aria-selected="false">Places</button>
          <button class="tab" id="tab-animals" role="tab" data-tab="animals" aria-controls="panel-animals" aria-selected="false">Animals</button>
          <button class="tab" id="tab-contact" role="tab" data-tab="contact" aria-controls="panel-contact" aria-selected="false">Contact</button>
        </nav>


        <div class="sidebar-meta">
          <a href="https://www.instagram.com/james_rogg/" target="_blank" rel="noreferrer">Instagram</a>
          <a href="tel:+17854308845">785-430-8845</a>
        </div>
      </aside>

      <main class="content" id="content">
        <section class="panel is-active" id="panel-portraits" data-panel="portraits" role="tabpanel" aria-labelledby="tab-portraits" tabindex="-1">
          <div class="photo-grid" data-grid="portraits" aria-live="polite"></div>
        </section>

        <section class="panel" id="panel-places" data-panel="places" role="tabpanel" aria-labelledby="tab-places" tabindex="-1" hidden>
          <div class="photo-grid" data-grid="places"></div>
        </section>

        <section class="panel" id="panel-animals" data-panel="animals" role="tabpanel" aria-labelledby="tab-animals" tabindex="-1" hidden>
          <div class="photo-grid" data-grid="animals"></div>
        </section>

        <section class="panel panel-copy" id="panel-contact" data-panel="contact" role="tabpanel" aria-labelledby="tab-contact" tabindex="-1" hidden>
          <header class="panel-head">
            <h2>Contact</h2>
          </header>
          <div class="copy-block">
            <p>For bookings, collaborations, or licensing, send your project details and we can talk details!</p>
          </div>

          <form class="contact-form" action="mailto:hello@jamesroggphoto.com" method="post" enctype="text/plain">
            <label>
              Name
              <input type="text" name="name" required />
            </label>
            <label>
              Email
              <input type="email" name="email" required />
            </label>
            <label>
              Project
              <textarea name="message" rows="5" required></textarea>
            </label>
            <button type="submit">Send Inquiry</button>
          </form>
        </section>
      </main>
    </div>

    <dialog class="lightbox" data-lightbox aria-label="Fullscreen image viewer">
      <div class="lightbox-inner">
        <button class="lightbox-close" type="button" data-lightbox-close aria-label="Close image viewer">x</button>
        <button class="lightbox-nav lightbox-prev" type="button" data-lightbox-prev aria-label="Previous image">‹</button>
        <img data-lightbox-image src="" alt="" />
        <button class="lightbox-nav lightbox-next" type="button" data-lightbox-next aria-label="Next image">›</button>
      </div>
    </dialog>

    <script src="assets/js/main.js?v=20260310j" defer></script>
  </body>
</html>
